{% assign lab = site.data.site.lab %}
{% assign brand = site.data.site.brand %}
{% assign nav_items = site.data.site.navigation %}
{% assign ui = site.data.site.ui %}
<header class="site-header" data-header>
  <a class="brand-lockup" href="index.html" aria-label="{{ lab.name }} home">
    <img src="{{ lab.logo }}" width="32" height="32" alt="" data-logo-role="mark" data-logo-default="{{ lab.logo }}" data-logo-a="assets/logo/logo-a.svg" data-logo-b="assets/logo/logo-b.svg" data-logo-c="assets/logo/logo-c.svg" />
    <span class="brand-stack">
      <span class="brand-word">{{ lab.name }}</span>
      <span class="brand-sub">{{ brand.subtitle }}</span>
    </span>
  </a>
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="{{ ui.accessibility.navigation_toggle }}">
    <span class="nav-toggle-line"></span>
    <span class="nav-toggle-line"></span>
    <span class="nav-toggle-line"></span>
  </button>
  <nav class="site-nav" id="site-nav" aria-label="{{ ui.accessibility.primary_navigation }}">
    {% for item in nav_items %}
      <a href="{{ item.url }}" class="nav-link{% if page.nav == item.id %} is-active{% endif %}">{{ item.label }}</a>
    {% endfor %}
    <a href="{{ lab.github }}" class="nav-link nav-github-mobile" target="_blank" rel="noreferrer">{{ ui.labels.github }}</a>
    <a href="{{ lab.github }}" class="nav-icon" target="_blank" rel="noreferrer" aria-label="{{ ui.labels.github_repository }}">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
        <path d="M9 18c-4.51 2-5-2-7-2"></path>
      </svg>
    </a>
  </nav>
</header>
