<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.button { align-items: center; border: 0; border-radius: 8px; cursor: pointer; display: inline-flex; font-family: var(--font-sans); font-size: 0.92rem; font-weight: 760; justify-content: center; min-height: 46px; padding: 0.75rem 1rem; transition: all 160ms ease; }
.button-primary { background: #111113; color: #fff; }
.button-primary:hover { background: #2b2d30; transform: translateY(-1px); }
.button-quiet { background: transparent; border: 1px solid var(--line); color: var(--ink); }
.button-quiet:hover { border-color: var(--ink); transform: translateY(-1px); }
.invert { background: var(--ink); padding: 18px 20px; border-radius: 8px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.invert .button-primary { background: #fff; color: var(--ink); }
.invert .button-primary:hover { background: #f1f3f2; }
.invert .button-quiet { color: #fff; border-color: rgba(255,255,255,0.3); }
.note { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style></head>
<body>
  <div class="row">
    <button class="button button-primary">Explore work</button>
    <button class="button button-quiet">Join the lab</button>
    <span class="note">on paper · primary inverts to ink, quiet is bordered</span>
  </div>
  <div class="invert">
    <button class="button button-primary">Contact BreathAI</button>
    <button class="button button-quiet">Read the paper ↗</button>
    <span class="note" style="color: rgba(255,255,255,0.6);">on ink · primary becomes white</span>
  </div>
</body></html>
