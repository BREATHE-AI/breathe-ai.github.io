{% assign lab = site.data.site.lab %}
{% assign footer = site.data.site.footer %}
<footer class="site-footer">
  <div class="footer-brand">
    <img src="{{ lab.logo }}" width="28" height="28" alt="" />
    <div>
      <strong>{{ lab.name }}</strong>
      <p>{{ footer.tagline }}</p>
      <p class="footer-colophon">{{ footer.colophon }}</p>
    </div>
  </div>
  <nav class="footer-links" aria-label="Footer links">
    <a href="{{ lab.github }}" target="_blank" rel="noreferrer">GitHub</a>
    <a href="mailto:{{ lab.email }}">Email</a>
    <a href="index.html">{% if page.nav == 'home' %}Top ↑{% else %}Home{% endif %}</a>
  </nav>
</footer>
