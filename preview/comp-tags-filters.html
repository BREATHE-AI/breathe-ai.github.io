<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.tag { border: 1px solid var(--line); border-radius: 999px; color: var(--ink-soft); font-size: 0.78rem; font-weight: 760; padding: 0.3rem 0.65rem; background: #fff; display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
.filter-group { background: white; border: 1px solid var(--line); border-radius: 8px; display: inline-flex; gap: 4px; padding: 4px; }
.filter-button { background: transparent; border: 0; border-radius: 6px; color: var(--ink-soft); cursor: pointer; font-size: 0.85rem; font-weight: 760; padding: 8px 14px; font-family: inherit; }
.filter-button.is-active { background: var(--ink); color: white; }
.note { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 4px; display: block; }
</style></head>
<body>
  <div class="row">
    <span class="tag">models</span>
    <span class="tag">agents</span>
    <span class="tag">eval</span>
    <span class="tag">multilingual</span>
    <span class="tag"><span class="dot" style="background: var(--amber);"></span>planned</span>
    <span class="tag"><span class="dot" style="background: var(--signal);"></span>active</span>
  </div>
  <span class="note">Tag · 1px line, 999 radius, white bg, ink-soft type</span>
  <div class="row" style="margin-top: 18px;">
    <div class="filter-group">
      <button class="filter-button is-active">All</button>
      <button class="filter-button">Models</button>
      <button class="filter-button">Agents</button>
      <button class="filter-button">Evaluation</button>
    </div>
  </div>
  <span class="note">Filter group · bordered shell, 6-radius pills, active is --ink</span>
</body></html>
