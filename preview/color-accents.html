<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 24px; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
.s { border: 1px solid var(--line); border-radius: 8px; height: 96px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: #fff; }
.s .n { font-weight: 700; }
.s .h { opacity: 0.8; }
.note { font-family: var(--font-sans); font-size: 12px; color: var(--ink-soft); margin: 0; max-width: 600px; line-height: 1.5; }
.note b { color: var(--ink); font-weight: 700; }
</style></head>
<body>
  <div class="row">
    <div class="s" style="background: #e4583f;"><span class="n">coral</span><span class="h">#E4583F</span></div>
    <div class="s" style="background: #6157d8;"><span class="n">violet</span><span class="h">#6157D8</span></div>
    <div class="s" style="background: #b47700;"><span class="n">amber</span><span class="h">#B47700</span></div>
  </div>
  <p class="note"><b>Coral</b> indexes numbered cards (01, 02) and publication years. <b>Violet</b> is reserved for agent / tooling tags. <b>Amber</b> is reserved for status labels (PLANNED, DRAFT). Never on body copy.</p>
</body></html>
