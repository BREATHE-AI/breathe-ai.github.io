<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.person-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 14px; }
.person-photo { align-items: center; background: linear-gradient(135deg, rgba(0,168,135,0.16), rgba(97,87,216,0.12)), white; border: 1px solid var(--line); border-radius: 8px; display: flex; font-family: var(--font-serif); font-size: 2rem; font-weight: 650; height: 100px; justify-content: center; margin-bottom: 12px; color: var(--ink); }
.person-role { color: var(--muted); display: block; font-size: 0.74rem; font-weight: 800; letter-spacing: 0.05em; margin-bottom: 4px; text-transform: uppercase; }
.person-card h3 { font-size: 0.98rem; margin: 0 0 4px; color: var(--ink); }
.person-card p { color: var(--ink-soft); font-size: 0.86rem; margin: 0; line-height: 1.45; }
.note { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin: 14px 0 0; }
</style></head>
<body>
  <div class="row">
    <article class="person-card">
      <div class="person-photo">B</div>
      <span class="person-role">Principal Investigator</span>
      <h3>Lab Director</h3>
      <p>Large language models, agents, evaluation, and NLP systems.</p>
    </article>
    <article class="person-card">
      <div class="person-photo">P</div>
      <span class="person-role">Incoming · PhD</span>
      <h3>PhD Student</h3>
      <p>Agent learning and tool-augmented reasoning.</p>
    </article>
  </div>
  <p class="note">Person card · initials in serif on signal/violet tint photo · role over name · focus paragraph</p>
</body></html>
