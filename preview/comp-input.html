<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.field { display: flex; flex-direction: column; gap: 6px; max-width: 360px; margin-bottom: 14px; }
label { font-size: 0.78rem; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); }
.input { background: #fff; border: 1px solid var(--line); border-radius: 8px; color: var(--ink); font-family: var(--font-sans); font-size: 0.95rem; min-height: 44px; padding: 0 0.85rem; }
.input:focus { outline: 2px solid var(--signal); outline-offset: 2px; border-color: var(--ink); }
.row { display: flex; gap: 10px; align-items: center; }
.button { background: var(--ink); color: #fff; border: 0; border-radius: 8px; padding: 12px 16px; font-family: var(--font-sans); font-size: 0.92rem; font-weight: 760; }
.note { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
</style></head>
<body>
  <div class="field">
    <label>Email · subscribe to lab notes</label>
    <div class="row">
      <input class="input" placeholder="you@institute.edu" style="flex:1;"/>
      <button class="button">Subscribe</button>
    </div>
    <span class="note">.input · 1px border, 8 radius, 44px min-height, focus = ink border + signal ring</span>
  </div>
</body></html>
