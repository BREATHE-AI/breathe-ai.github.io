<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.scale { display: flex; gap: 8px; align-items: flex-end; }
.bar { background: var(--ink); }
.unit { display: flex; flex-direction: column; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.unit .name { color: var(--ink); font-weight: 700; font-size: 11px; }
.note { font-family: var(--font-sans); font-size: 12px; color: var(--ink-soft); margin-top: 22px; max-width: 600px; }
.note b { color: var(--ink); font-weight: 700; }
</style></head>
<body>
  <div class="scale">
    <div class="unit"><div class="bar" style="width: 4px; height: 4px;"></div><span class="name">1</span><span>4</span></div>
    <div class="unit"><div class="bar" style="width: 8px; height: 8px;"></div><span class="name">2</span><span>8</span></div>
    <div class="unit"><div class="bar" style="width: 12px; height: 12px;"></div><span class="name">3</span><span>12</span></div>
    <div class="unit"><div class="bar" style="width: 16px; height: 16px;"></div><span class="name">4</span><span>16</span></div>
    <div class="unit"><div class="bar" style="width: 20px; height: 20px;"></div><span class="name">5</span><span>20</span></div>
    <div class="unit"><div class="bar" style="width: 24px; height: 24px;"></div><span class="name">6</span><span>24</span></div>
    <div class="unit"><div class="bar" style="width: 32px; height: 32px;"></div><span class="name">8</span><span>32</span></div>
    <div class="unit"><div class="bar" style="width: 40px; height: 40px;"></div><span class="name">10</span><span>40</span></div>
    <div class="unit"><div class="bar" style="width: 48px; height: 48px;"></div><span class="name">12</span><span>48</span></div>
    <div class="unit"><div class="bar" style="width: 64px; height: 64px;"></div><span class="name">16</span><span>64</span></div>
    <div class="unit"><div class="bar" style="width: 80px; height: 80px;"></div><span class="name">20</span><span>80</span></div>
  </div>
  <p class="note"><b>4-pt scale.</b> Use <b>--space-3 / --space-4</b> for tight UI, <b>--space-5 / --space-6</b> inside cards, <b>--space-12 / --space-16</b> between sections, <b>4vw gutter</b> on the page edge.</p>
</body></html>
