join_page:
  eyebrow: Join
  title: Help build the lab from its first chapter.
  body: This page is structured for PhD students, research assistants, interns, and visiting scholars. Exact openings, deadlines, and application instructions should be confirmed by the PI before publication.
  positions_eyebrow: Open Positions
  positions_title: Current openings
  positions_empty: Confirmed openings will appear here.
  qualities_eyebrow: What we look for
  qualities_title: Qualities to discuss with applicants.
  qualities_intro: These points are editable placeholders. Keep only the expectations the PI wants to make public.
  qualities:
    - title: Clear thinking about language and knowledge.
      body: Interest in how models represent meaning, reason, fail, and improve.
    - title: Strong engineering judgment.
      body: Ability to build experiments and systems that are reliable, readable, and reproducible.
    - title: Research taste.
      body: A sense for questions that matter and results that are worth trusting.
    - title: Comfort with uncertainty.
      body: Early-stage labs need people who can work before every direction is obvious.
