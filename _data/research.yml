meta:
  title: Research — BREATHE AI Lab at NTU
  description: Research and publications from BREATHE AI Lab at Nanyang Technological University.

statement:
  screen_label: 01 Research · Statement
  eyebrow: Research
  title: Research
  lead: We study AI systems that learn from experience, reason in language, and stay both efficient and responsible under real constraints.
  body: BREATHE AI Lab's central question is how language models can move beyond static prediction toward systems that improve through interaction with tools and feedback, stay efficient enough to deploy at scale, and earn trust through evidence rather than impression.

  themes_aria_label: Research themes
  themes:
    - title: Self-evolving AI
      body: Models and agents that adapt from feedback, trajectories, tool use, and experience.
    - title: Language agents
      body: Systems that plan, use tools, collaborate, and complete long-horizon tasks.
    - title: Small language models
      body: Compact models that remain capable, controllable, and useful under deployment constraints.
    - title: Responsible evaluation
      body: Measurements that expose capability, robustness, failure modes, and usefulness.

