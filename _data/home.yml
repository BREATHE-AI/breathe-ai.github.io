title: BreatheAI
lede: Advancing language intelligence through self-evolving models, capable agents, and efficient AI systems.
body: BreatheAI Lab studies how language models can reason, adapt, and act in the world. Our work connects natural language processing, machine learning, and agentic systems, with a focus on models that improve through experience, operate reliably under constraints, and remain useful beyond benchmark settings.
