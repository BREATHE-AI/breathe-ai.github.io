<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.s { border: 1px solid var(--line); border-radius: 8px; height: 96px; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; }
.s .n { font-weight: 700; }
.s .h { opacity: 0.6; }
.dark { color: #fff; }
.dark .h { opacity: 0.7; }
</style></head>
<body>
  <div class="grid">
    <div class="s" style="background: #fbfbfb;"><span class="n">paper</span><span class="h">#FBFBFB</span></div>
    <div class="s" style="background: #f1f3f2;"><span class="n">paper-soft</span><span class="h">#F1F3F2</span></div>
    <div class="s" style="background: #f6f2ea;"><span class="n">paper-ivory</span><span class="h">#F6F2EA</span></div>
    <div class="s dark" style="background: #111113;"><span class="n">ink</span><span class="h">#111113</span></div>
    <div class="s dark" style="background: #3f4247;"><span class="n">ink-soft</span><span class="h">#3F4247</span></div>
    <div class="s dark" style="background: #72777f;"><span class="n">muted</span><span class="h">#72777F</span></div>
    <div class="s" style="background: #dedfdd;"><span class="n">line</span><span class="h">#DEDFDD</span></div>
    <div class="s" style="background: #fff; border-style: dashed;"><span class="n">white</span><span class="h">#FFFFFF</span></div>
  </div>
</body></html>
