{% assign lab = site.data.site.lab %}
<header class="site-header" data-header>
  <a class="brand-lockup" href="index.html" aria-label="{{ lab.name }} home">
    <img src="{{ lab.logo }}" width="28" height="28" alt="" />
    <span>{{ lab.name }}</span>
  </a>
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation">
    <span class="nav-toggle-line"></span>
    <span class="nav-toggle-line"></span>
    <span class="nav-toggle-line"></span>
  </button>
  <nav class="site-nav" id="site-nav" aria-label="Primary navigation">
    <a href="index.html" class="nav-link{% if page.nav == 'home' %} is-active{% endif %}">Home</a>
    <a href="research.html" class="nav-link{% if page.nav == 'research' %} is-active{% endif %}">Research</a>
    <a href="people.html" class="nav-link{% if page.nav == 'people' %} is-active{% endif %}">People</a>
    <a href="join.html" class="nav-link{% if page.nav == 'join' %} is-active{% endif %}">Join</a>
    <a href="{{ lab.github }}" class="nav-link nav-github-mobile" target="_blank" rel="noreferrer">GitHub</a>
    <a href="{{ lab.github }}" class="nav-icon" target="_blank" rel="noreferrer" aria-label="GitHub repository">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.2c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
        <path d="M9 18c-4.51 2-5-2-7-2"></path>
      </svg>
    </a>
  </nav>
</header>
