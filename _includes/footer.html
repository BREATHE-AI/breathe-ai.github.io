{% assign lab = site.data.site.lab %}
{% assign footer = site.data.site.footer %}
{% assign ui = site.data.site.ui %}
{% assign asset_version = site.data.site.asset_version %}
<footer class="site-footer" id="site-footer">
  <div>
    <span class="lockup">
      <img class="lockup__mark" src="{{ lab.logo }}?v={{ asset_version }}" width="30" height="30" alt="" />
      <span class="lockup__text">
        <span class="lockup__name">{{ lab.short_name }}</span>
      </span>
    </span>
    <p class="site-footer__tagline">{{ footer.tagline }}</p>
    <p class="site-footer__colophon">{{ footer.colophon }}</p>
  </div>
</footer>
