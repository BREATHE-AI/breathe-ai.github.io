# Join page content.
#
# Content editors usually update:
# - intro.body / intro.note: visible recruitment copy
# - positions.items: open roles shown on the Join page
# - apply.block: contact/application instructions
#
# Usually leave meta and screen_label unchanged unless the page purpose or
# structure changes.

meta:
  title: Join — BREATHE AI Lab at NTU
  description: Opportunities to work with BREATHE AI Lab at NTU as a PhD student, research fellow, research associate, research engineer, intern, or visiting student.

intro:
  screen_label: 01 Join · Intro
  eyebrow:
  title: Join
  body: We are building a new team at NTU and welcome enquiries from self-motivated PhD students, researchers, engineers, interns, and visiting students.
  note: If you are interested in joining the group, please email Prof. Lu directly with a short introduction, your CV, a brief statement of research interests, and links to papers, code, or project pages if available.

positions:
  screen_label: 02 Join · Positions
  eyebrow:
  title: Open roles
