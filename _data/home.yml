# Home page content and homepage news.
#
# Edit this file to maintain all visible homepage text: hero copy, buttons,
# News items, and the recruiting strip.
#
# News items are shown in file order. Keep newest items first.
#
# Optional fields:
# - news.items[].image: add src + alt to show a thumbnail under a News item.
# - news.items[].links: add label + url. External arrows are added
#   automatically for http(s) URLs; external: true is only needed for unusual
#   external URL formats.
# - recruiting.show: set false to hide the recruiting strip.

