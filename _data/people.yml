# People page content.
#
# Edit this file to maintain all visible People page text: page title, group
# names, member names, roles, education rows, and profile links.
#
# Optional member fields:
# - image: add src + alt to show a portrait. Omit image to show initials.
# - education: add rows with degree, institution, optional department, and
#   optional note. Use note for the degree year only, e.g. 2025 or 2027 expected.
#   If no degree is known yet, use degree: Affiliation as a fallback.
# - links: add label + url rows for profile pages.
# Groups with no members should be omitted; the template also hides any empty
# group defensively.

