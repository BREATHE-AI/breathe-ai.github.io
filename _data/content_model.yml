# Content model reference for editors.
#
# Current Editorial site data is organized by page, not by legacy components.

pages:
  home: _data/home.yml
  research: _data/research.yml
  people: _data/people.yml
  join: _data/join.yml
  logo_options: _data/logo_options.yml

global:
  site_identity_navigation_footer: _data/site.yml

assets:
  people_photos: assets/img/people/
  publication_images: assets/img/publications/
  project_images: assets/img/projects/
  publication_files: assets/data/publications/

link_kinds:
  - html
  - pdf
  - code
  - data
  - demo
  - slides
  - video
  - profile

notes:
  - Edit page copy in the matching page YAML file: home, research, people, or join.
  - Do not add legacy compatibility data that is not rendered by the current templates.
  - Any link can point to an external URL or to a file inside this repository, such as assets/data/publications/example.pdf.
  - Optional image fields use src, alt, and caption keys. If an image is missing, the template keeps the current text-only layout.
