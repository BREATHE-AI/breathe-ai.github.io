<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.row { display: flex; gap: 60px; align-items: baseline; flex-wrap: wrap; }
.eyebrow { color: var(--signal-dark); font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
.kicker { color: var(--coral); font-size: 12px; font-weight: 850; letter-spacing: 0.12em; text-transform: uppercase; }
.muted { color: var(--muted); font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
.label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 8px; display: block; }
.unit { display: flex; flex-direction: column; }
hr { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }
.specimen { color: var(--ink-soft); font-size: 13px; line-height: 1.6; max-width: 600px; }
.specimen b { color: var(--ink); font-weight: 700; }
</style></head>
<body>
  <div class="row">
    <div class="unit"><span class="eyebrow">Research</span><span class="label">.eyebrow · signal-dark</span></div>
    <div class="unit"><span class="kicker">01</span><span class="label">.kicker · coral</span></div>
    <div class="unit"><span class="muted">Now</span><span class="label">muted · meta</span></div>
  </div>
  <hr/>
  <p class="specimen">Eyebrows label what kind of section follows: <b>RESEARCH</b>, <b>NOW</b>, <b>JOIN</b>. Kickers index numbered or lettered cards: <b>01–04</b>, <b>A–D</b>. Muted labels are time/place metadata: <b>Singapore · 2026</b>.</p>
</body></html>
