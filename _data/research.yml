agenda:
  - index: "01"
    title: Self-evolving AI
    summary: Learning systems that improve from feedback, interaction, and experience.
  - index: "02"
    title: Language agents
    summary: Agents that reason, use tools, and act across realistic tasks.
  - index: "03"
    title: Small language models
    summary: Compact models for controllable, efficient, and deployable intelligence.
  - index: "04"
    title: Responsible evaluation
    summary: Evidence for capability, robustness, adaptation, and failure modes.

areas:
  - index: A
    title: Self-Evolving AI
    body: We study how AI systems can improve through interaction, feedback, and experience, including learning procedures that turn model behavior, tool use, and task outcomes into stronger future performance.
    topics:
      - Continual improvement
      - Experiential learning
      - Feedback-driven adaptation
      - Self-refinement
  - index: B
    title: Language Agents
    body: We build and evaluate agents that reason over language, use external tools, coordinate across steps or collaborators, and operate in realistic research, coding, and knowledge-work settings.
    topics:
      - Tool use
      - Planning
      - Multi-agent systems
      - Long-horizon tasks
  - index: C
    title: Small Language Models
    body: We investigate compact and specialized models that can reason, follow instructions, and serve as controllable components in larger AI systems, with attention to data, training, and deployment constraints.
    topics:
      - Efficient training
      - Model specialization
      - Distillation
      - On-device AI
  - index: D
    title: Evaluation and Understanding
    body: We design evaluation methods that reveal how systems reason, adapt, fail, and generalize, moving beyond leaderboard scores toward evidence that can guide scientific and engineering decisions.
    topics:
      - Behavioral evaluation
      - Robustness
      - Interpretability
      - Reproducibility
