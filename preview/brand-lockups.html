<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>body { padding: 28px; }
.stack { display: flex; flex-direction: column; gap: 22px; }
.line { display: flex; gap: 18px; align-items: center; }
.line img { display: block; }
.lab { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
.dark { background: var(--ink); padding: 14px 18px; border-radius: 8px; }
</style></head>
<body>
  <div class="stack">
    <div class="line">
      <img src="../assets/breathai-lockup.svg" width="220" height="36"/>
      <span class="lab">primary lockup · header</span>
    </div>
    <div class="line">
      <img src="../assets/ntu-association.svg" width="300" height="52"/>
      <span class="lab">NTU association · footer / about</span>
    </div>
    <div class="line">
      <div class="dark"><img src="../assets/breathai-lockup.svg" width="220" height="36" style="filter: invert(1);"/></div>
      <span class="lab">on --ink · invert filter</span>
    </div>
  </div>
</body></html>
